name: Build PPIP Reporter EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m compileall .

      - name: Build Streamlit EXE
        run: |
          pyinstaller --clean --noconfirm PPIP_Reporter.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPIP_Production_Planning_Reporter_EXE
          path: |
            dist/PPIP_Production_Planning_Reporter.exe
            README.md
            README_GITHUB_BUILD.md
          if-no-files-found: error
